<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Sticky note body -->
  <rect x="24" y="32" width="72" height="68" rx="6" fill="#FEF3C7"/>
  <!-- Fold triangle -->
  <polygon points="84,32 96,32 96,44" fill="#F59E0B" opacity="0.6"/>
  <!-- Note lines -->
  <line x1="34" y1="54" x2="76" y2="54" stroke="#92400E" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="34" y1="66" x2="76" y2="66" stroke="#92400E" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="34" y1="78" x2="60" y2="78" stroke="#92400E" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Pin shadow hint -->
  <circle cx="60" cy="34" r="3" fill="#F59E0B" opacity="0.5"/>
</svg>
