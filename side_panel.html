<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="side_panel.css" />
  </head>
  <body class="light">
    <!-- ═══════════════ HEADER ═══════════════ -->
    <header class="header">
      <div class="header-left">
        <svg
          class="logo-icon"
          viewBox="0 0 24 24"
          fill="none"
          aria-hidden="true"
        >
          <rect
            x="3"
            y="4"
            width="14"
            height="16"
            rx="2"
            fill="currentColor"
            opacity="0.9"
          />
          <polygon points="17,4 20,4 20,7" fill="currentColor" opacity="0.5" />
          <line
            x1="6"
            y1="9"
            x2="14"
            y2="9"
            stroke="white"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <line
            x1="6"
            y1="12"
            x2="14"
            y2="12"
            stroke="white"
            stroke-width="1.5"
            stroke-linecap="round"
          />
          <line
            x1="6"
            y1="15"
            x2="11"
            y2="15"
            stroke="white"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <h1 class="header-title" data-i18n="app.title">Ghi Chú</h1>
      </div>
      <div class="header-actions">
        <!-- Feature Switcher -->
        <div class="feat-switcher" role="tablist" aria-label="Switch feature">
          <button
            class="feat-btn active"
            data-feature="notes"
            role="tab"
            aria-selected="true"
            title="Ghi Chú"
            data-i18n-title="feat.notes"
            data-i18n-label="feat.notes"
            aria-label="Ghi Chú"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <rect x="3" y="4" width="13" height="15" rx="2" />
              <line x1="6" y1="9" x2="13" y2="9" />
              <line x1="6" y1="12" x2="13" y2="12" />
              <line x1="6" y1="15" x2="10" y2="15" />
              <polygon points="16,3 19,3 19,6" />
            </svg>
            <span data-i18n="feat.notes">Ghi Chú</span>
          </button>
          <button
            class="feat-btn"
            data-feature="move"
            role="tab"
            aria-selected="false"
            title="Di Chuyển"
            data-i18n-title="feat.move"
            data-i18n-label="feat.move"
            aria-label="Di Chuyển"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="4" r="2" />
              <path d="M12 7v5m0 0-3 4m3-4 3 4" />
              <path d="M9 11h6" />
            </svg>
            <span data-i18n="feat.move">Di Chuyển</span>
          </button>
        </div>

        <!-- Lang Toggle -->
        <button
          id="btn-lang"
          class="icon-btn lang-btn"
          title="Switch language"
          aria-label="Switch language"
        >
          EN
        </button>

        <!-- Theme Toggle -->
        <button
          id="btn-theme"
          class="icon-btn"
          data-i18n-title="btn.theme"
          data-i18n-label="btn.theme"
          aria-label="Chuyển giao diện"
        >
          <svg
            id="icon-sun"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg
            id="icon-moon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="display: none"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>

        <!-- New Note (Notes mode only) -->
        <button
          id="btn-new"
          class="btn-primary"
          title="New note"
          aria-label="Create new note"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
          >
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          <span data-i18n="btn.new">Mới</span>
        </button>
      </div>
    </header>

    <!-- ═══════════════ NOTES SECTION ═══════════════ -->
    <div id="notes-section">
      <!-- SEARCH -->
      <div class="search-wrap">
        <div class="search-box">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            aria-hidden="true"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input
            id="search-input"
            class="search-input"
            type="text"
            placeholder="Tìm ghi chú…"
            data-i18n-ph="search.placeholder"
            data-i18n-label="search.placeholder"
            aria-label="Tìm ghi chú"
          />
          <button
            id="btn-clear-search"
            class="clear-btn"
            data-i18n-label="search.clear"
            aria-label="Xóa tìm kiếm"
            style="display: none"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </div>

      <!-- FILTER TABS -->
      <nav class="tabs" role="tablist" aria-label="Filter notes">
        <button
          class="tab active"
          data-tab="all"
          role="tab"
          aria-selected="true"
        >
          <span data-i18n="tab.all">Tất Cả</span>
        </button>
        <button class="tab" data-tab="page" role="tab" aria-selected="false">
          <span data-i18n="tab.page">Trang Này</span>
        </button>
        <button
          class="tab"
          data-tab="favorites"
          role="tab"
          aria-selected="false"
        >
          <span data-i18n="tab.favorites">Yêu Thích</span>
        </button>
        <button class="tab" data-tab="archive" role="tab" aria-selected="false">
          <span data-i18n="tab.archive">Lưu Trữ</span>
        </button>
      </nav>

      <!-- NOTES LIST -->
      <main id="notes-container" class="notes-container" role="main"></main>

      <!-- EMPTY STATE -->
      <div id="empty-state" class="empty-state" hidden>
        <svg
          class="empty-icon"
          viewBox="0 0 80 80"
          fill="none"
          aria-hidden="true"
        >
          <rect
            x="10"
            y="14"
            width="44"
            height="52"
            rx="6"
            fill="currentColor"
            opacity="0.08"
          />
          <rect
            x="14"
            y="10"
            width="44"
            height="52"
            rx="6"
            fill="currentColor"
            opacity="0.12"
          />
          <rect
            x="18"
            y="6"
            width="44"
            height="52"
            rx="6"
            fill="currentColor"
            opacity="0.18"
          />
          <line
            x1="26"
            y1="24"
            x2="54"
            y2="24"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            opacity="0.5"
          />
          <line
            x1="26"
            y1="32"
            x2="54"
            y2="32"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            opacity="0.5"
          />
          <line
            x1="26"
            y1="40"
            x2="42"
            y2="40"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            opacity="0.5"
          />
        </svg>
        <p id="empty-title" class="empty-title">No notes yet</p>
        <p id="empty-subtitle" class="empty-subtitle">
          Click <strong>New</strong> to create your first sticky note
        </p>
      </div>
    </div>
    <!-- /#notes-section -->

    <!-- ═══════════════ REMINDER SECTION ═══════════════ -->
    <div id="reminder-section" class="reminder-section" hidden>
      <!-- Rendered dynamically by reminder.js -->
      <div class="reminder-loading">Loading…</div>
    </div>

    <!-- ═══════════════ NOTE EDITOR MODAL ═══════════════ -->
    <div
      id="editor-overlay"
      class="editor-overlay"
      hidden
      role="dialog"
      aria-modal="true"
      aria-label="Note editor"
    >
      <div class="editor-card" id="editor-card">
        <!-- Color strip -->
        <div class="editor-color-strip" id="editor-strip"></div>

        <!-- Editor header -->
        <div class="editor-header">
          <input
            id="editor-title"
            class="editor-title-input"
            type="text"
            placeholder="Title (optional)"
            maxlength="80"
            aria-label="Note title"
          />
          <button
            id="btn-close-editor"
            class="icon-btn"
            aria-label="Close editor"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>

        <!-- Rich text toolbar -->
        <div class="editor-toolbar" role="toolbar" aria-label="Formatting">
          <button
            class="tool-btn"
            data-cmd="bold"
            aria-label="Bold"
            title="Bold (Ctrl+B)"
          >
            <strong>B</strong>
          </button>
          <button
            class="tool-btn"
            data-cmd="italic"
            aria-label="Italic"
            title="Italic (Ctrl+I)"
          >
            <em>I</em>
          </button>
          <button
            class="tool-btn"
            data-cmd="underline"
            aria-label="Underline"
            title="Underline (Ctrl+U)"
          >
            <u>U</u>
          </button>
          <button
            class="tool-btn"
            data-cmd="strikeThrough"
            aria-label="Strikethrough"
            title="Strikethrough"
          >
            <s>S</s>
          </button>
          <div class="toolbar-divider" aria-hidden="true"></div>
          <button
            class="tool-btn"
            data-cmd="insertUnorderedList"
            aria-label="Bullet list"
            title="Bullet list"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              width="14"
              height="14"
            >
              <line x1="9" y1="6" x2="20" y2="6" />
              <line x1="9" y1="12" x2="20" y2="12" />
              <line x1="9" y1="18" x2="20" y2="18" />
              <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none" />
              <circle
                cx="4"
                cy="12"
                r="1.5"
                fill="currentColor"
                stroke="none"
              />
              <circle
                cx="4"
                cy="18"
                r="1.5"
                fill="currentColor"
                stroke="none"
              />
            </svg>
          </button>
        </div>

        <!-- Content area -->
        <div
          id="editor-content"
          class="editor-content"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          data-i18n-ph="editor.content_ph"
          aria-label="Nội dung ghi chú"
          data-placeholder="Viết ghi chú của bạn…"
        ></div>

        <!-- Color picker + actions -->
        <div class="editor-footer">
          <div class="color-picker" role="group" aria-label="Note color">
            <button
              class="color-dot active"
              data-color="yellow"
              aria-label="Yellow"
              style="background: #fde68a"
              aria-pressed="true"
            ></button>
            <button
              class="color-dot"
              data-color="pink"
              aria-label="Pink"
              style="background: #fecdd3"
              aria-pressed="false"
            ></button>
            <button
              class="color-dot"
              data-color="green"
              aria-label="Green"
              style="background: #bbf7d0"
              aria-pressed="false"
            ></button>
            <button
              class="color-dot"
              data-color="blue"
              aria-label="Blue"
              style="background: #bfdbfe"
              aria-pressed="false"
            ></button>
            <button
              class="color-dot"
              data-color="purple"
              aria-label="Purple"
              style="background: #ddd6fe"
              aria-pressed="false"
            ></button>
            <button
              class="color-dot"
              data-color="white"
              aria-label="White"
              style="background: #f8fafc; border: 1.5px solid #cbd5e1"
              aria-pressed="false"
            ></button>
          </div>
          <div class="editor-footer-actions">
            <button
              id="btn-toggle-favorite"
              class="icon-btn"
              aria-label="Toggle favorite"
              title="Favorite"
            >
              <svg
                id="star-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon
                  points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                />
              </svg>
            </button>
            <button
              id="btn-archive"
              class="icon-btn"
              aria-label="Archive note"
              title="Archive"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <polyline points="21 8 21 21 3 21 3 8" />
                <rect x="1" y="3" width="22" height="5" rx="1" />
                <line x1="10" y1="12" x2="14" y2="12" />
              </svg>
            </button>
            <button
              id="btn-delete"
              class="icon-btn danger"
              aria-label="Delete note"
              title="Delete"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              >
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14H6L5 6" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
                <path d="M9 6V4h6v2" />
              </svg>
            </button>
            <button
              id="btn-save"
              class="btn-primary"
              data-i18n-label="editor.save"
              aria-label="Lưu ghi chú"
            >
              <span data-i18n="editor.save">Lưu</span>
            </button>
          </div>
        </div>

        <!-- URL tag -->
        <div id="url-tag" class="url-tag" hidden>
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            width="12"
            height="12"
            aria-hidden="true"
          >
            <path
              d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"
            />
            <path
              d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"
            />
          </svg>
          <span id="url-tag-text"></span>
        </div>
      </div>
    </div>

    <!-- ═══════════════ FAB (Notes only) ═══════════════ -->
    <button id="fab" class="fab" aria-label="Create new note" title="New note">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        stroke-linecap="round"
      >
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
    </button>

    <!-- ═══════════════ TOAST ═══════════════ -->
    <div id="toast" class="toast" role="alert" aria-live="polite" hidden></div>

    <!-- ═══════════════ SCRIPTS (order matters) ═══════════════ -->
    <script src="shared.js"></script>
    <script src="side_panel.js"></script>
    <script src="reminder.js"></script>
  </body>
</html>
